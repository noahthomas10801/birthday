<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Letter</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#000;
}

/* OPEN SCREEN */
#openScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  cursor:pointer;
  background:linear-gradient(135deg,#0f3d1e,#1f6f3a);
}
.envelope{font-size:60px;margin-bottom:20px;}
.swipeHint{
  position:absolute;
  bottom:40px;
  font-size:14px;
  opacity:0.8;
  animation:hintPulse 1.5s infinite;
}
@keyframes hintPulse{
  0%,100%{opacity:0.5}
  50%{opacity:1}
}

/* MAIN CONTENT */
#content{
  display:none;
  position:relative;
  width:100vw;
  height:100vh;
}

/* PANELS */
.panel{
  position:absolute;
  width:100%;
  height:100%;
  padding:12px;
  opacity:0;
  transition:opacity .5s ease;
  overflow-y:auto;
}
.panel.active{
  opacity:1;
  z-index:2;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.grid img{
  width:100%;
  height:auto;
  border-radius:14px;
  object-fit:cover;
  box-shadow:0 6px 16px rgba(0,0,0,0.5);
}

.caption{
  text-align:center;
  color:white;
  margin-top:10px;
  font-size:16px;
}

/* LETTER */
.letter{
  margin-top:12px;
  padding:16px;
  background:linear-gradient(135deg,#2e8b57,#3cb371);
  color:white;
  border-radius:14px;
  font-size:16px;
  line-height:1.5;
  opacity:0;
  transition:opacity 1s ease;
}

/* ANIMATION LAYER */
.animLayer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:9999;
  overflow:hidden;
}

.fallItem{
  position:fixed;
  top:-60px;
  will-change:transform;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translate3d(0,0,0) rotate(0deg);}
  100%{transform:translate3d(0,110vh,0) rotate(360deg);}
}

/* SWIPE INDICATOR */
.swipeIndicator{
  position:fixed;
  right:15px;
  bottom:20px;
  color:white;
  font-size:14px;
  opacity:0.8;
  animation:hintPulse 1.5s infinite;
  z-index:10;
}
</style>
</head>

<body>

<div id="openScreen">
  <div class="envelope">✉️</div>
  <h1>Click to Open</h1>
</div>

<div id="content">

  <div id="frogsLayer" class="animLayer"></div>
  <div id="strawLayer" class="animLayer"></div>

  <div class="swipeIndicator">⬅ Swipe Left</div>

  <!-- PANEL 1 -->
  <div class="panel active">
    <div class="grid">
      <img src="photo8.jpeg">
      <img src="photo9.jpeg">
      <img src="photo10.jpeg">
      <img src="photo11.jpeg">
    </div>
    <div class="caption">Our Memories ❤️</div>
  </div>

  <!-- PANEL 2 -->
  <div class="panel">
    <div class="grid">
      <img src="photo12.jpeg">
      <img src="photo13.jpeg">
      <img src="photo14.jpeg">
      <img src="photo15.jpeg">
    </div>
    <div class="caption">More Adventures ✨</div>
  </div>

  <!-- PANEL 3 -->
  <div class="panel">
    <div class="grid">
      <img src="photo2.jpeg">
      <img src="photo3.jpeg">
      <img src="photo4.jpeg">
      <img src="photo5.jpeg">
    </div>
    <div class="letter" id="finalLetter">
      Happy Birthday ❤️<br><br>
      Every memory with you is my favorite memory.
      You make my world brighter every single day.
      I love you endlessly.
    </div>
  </div>

</div>

<script>
const openScreen = document.getElementById("openScreen");
const content = document.getElementById("content");
const panels = document.querySelectorAll(".panel");
const finalLetter = document.getElementById("finalLetter");
const frogsLayer = document.getElementById("frogsLayer");
const strawLayer = document.getElementById("strawLayer");

let current = 0;
let startX = 0;

/* LOCAL IMAGE FILES */
const frogURL = "frog.png";
const strawberryURL = "strawberry.png";

/* Generate falling items */
function generateFalling(layer, src, count){
  layer.innerHTML = "";
  for(let i=0;i<count;i++){
    const img = document.createElement("img");
    img.src = src;
    img.className = "fallItem";
    img.style.left = Math.random()*100 + "vw";
    img.style.width = 25 + Math.random()*20 + "px";
    img.style.animationDuration = 4 + Math.random()*4 + "s";
    img.style.animationDelay = Math.random()*3 + "s";
    layer.appendChild(img);
  }
}

/* Open click */
openScreen.addEventListener("click",()=>{
  openScreen.style.display="none";
  content.style.display="block";
  generateFalling(frogsLayer, frogURL, 40);
});

/* Swipe */
document.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});
document.addEventListener("touchend",e=>{
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) nextPanel();
  if(endX - startX > 50) prevPanel();
});

function nextPanel(){
  if(current < panels.length-1){
    panels[current].classList.remove("active");
    current++;
    panels[current].classList.add("active");
    updateAnimations();
  }
}
function prevPanel(){
  if(current > 0){
    panels[current].classList.remove("active");
    current--;
    panels[current].classList.add("active");
    updateAnimations();
  }
}

function updateAnimations(){
  frogsLayer.innerHTML="";
  strawLayer.innerHTML="";

  if(current === 0){
    generateFalling(frogsLayer, frogURL, 40);
  }
  if(current === 1){
    generateFalling(strawLayer, strawberryURL, 40);
  }
  if(current === 2){
    finalLetter.style.opacity=1;
  } else {
    finalLetter.style.opacity=0;
  }
}
</script>

</body>
</html>
