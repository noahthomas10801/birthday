<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* Opening Screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8e063, #56ab2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 100;
}

#startScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: white;
  margin-top: 20px;
}

.envelope {
  width: 90px;
  height: 60px;
  background: white;
  position: relative;
  border-radius: 6px;
}

.envelope:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-top: 30px solid #e0e0e0;
}

/* Main Content */
#mainContent {
  display: none;
}

/* Collage Section */
.collage {
  display: grid;
  grid-template-rows: repeat(5, 1fr);
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  width: 100%;
  height: 100vh; /* Full screen */
  box-sizing: border-box;
  padding: 10px;
}

/* Pyramid placement using grid */
.collage img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Specific photo placement */
.photo1 { grid-column: 1 / span 2; grid-row: 1; }
.photo2 { grid-column: 1; grid-row: 2; }
.photo3 { grid-column: 2; grid-row: 2; }
.photo7 { grid-column: 1 / span 2; grid-row: 3; } /* center large */
.photo4 { grid-column: 1; grid-row: 4; }
.photo5 { grid-column: 2; grid-row: 4; }
.photo6 { grid-column: 1 / span 2; grid-row: 5; }

/* Letter below collage */
.letter {
  display: block;
  max-width: 900px;
  margin: 20px auto 80px auto;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.8;
  color: #1b4332;
  padding: 25px;
  background: linear-gradient(135deg, #c8f7c5, #56ab2f);
  border-radius: 16px;
  text-align: center;
  z-index: 1;
}

/* Frogs */
.frog {
  position: fixed;
  width: 30px;
  height: 30px;
  background-image: url('https://i.imgur.com/gXaNddC.png');
  background-size: contain;
  background-repeat: no-repeat;
  pointer-events: none;
  z-index: 30;
}

/* Leaves */
.leaf {
  position: fixed;
  width: 25px;
  height: 25px;
  background-image: url('https://i.imgur.com/46e8VzS.png');
  background-size: contain;
  background-repeat: no-repeat;
  opacity: 0.7;
  pointer-events: none;
  z-index: 28;
}

/* Mobile adjustments */
@media (max-width: 600px) {
  .collage {
    grid-template-rows: repeat(7, 1fr);
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 5px;
  }
  .photo1, .photo7, .photo6 { grid-column: 1; }
  .photo2, .photo3, .photo4, .photo5 { grid-column: 1; }
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="envelope"></div>
  <h1>Click to Open</h1>
</div>

<div id="mainContent">
  <div class="collage">
    <img src="photo1.jpeg" class="photo1">
    <img src="photo2.jpeg" class="photo2">
    <img src="photo3.jpeg" class="photo3">
    <img src="photo7.jpeg" class="photo7">
    <img src="photo4.jpeg" class="photo4">
    <img src="photo5.jpeg" class="photo5">
    <img src="photo6.jpeg" class="photo6">
  </div>

  <div class="letter">
    My love,<br><br>
    Every moment with you feels like magic.
    You are my favorite memory, my favorite laugh,
    and my favorite place to be.
    I made this just for you. 💚
  </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");

startScreen.addEventListener("click", () => {
  startScreen.style.display = "none";
  mainContent.style.display = "block";

  createFrogs();
  createLeaves();
});

/* Frogs falling from top of the viewport */
function createFrogs() {
  const frogCount = window.innerWidth < 600 ? 20 : 50;

  for (let i = 0; i < frogCount; i++) {
    spawnFrog(Math.random() * window.innerWidth, -50);
  }

  function spawnFrog(x, y) {
    const frog = document.createElement("div");
    frog.classList.add("frog");
    frog.x = x;
    frog.y = y;
    frog.vx = (Math.random() - 0.5) * 1.5;
    frog.vy = 1 + Math.random() * 2;
    frog.rotation = Math.random() * 360;
    frog.spinSpeed = (Math.random() - 0.5) * 5;
    document.body.appendChild(frog);

    function animate() {
      frog.x += frog.vx;
      frog.y += frog.vy;
      frog.rotation += frog.spinSpeed;
      frog.style.transform = `translate(${frog.x}px, ${frog.y}px) rotate(${frog.rotation}deg)`;

      if (frog.y < window.innerHeight + 50) requestAnimationFrame(animate);
    }

    animate();
  }
}

/* Leaves falling from top of viewport */
function createLeaves() {
  const leafCount = window.innerWidth < 600 ? 10 : 15;

  for (let i = 0; i < leafCount; i++) {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.x = Math.random() * window.innerWidth;
    leaf.y = -20;
    leaf.speed = 0.3 + Math.random();
    document.body.appendChild(leaf);

    function animateLeaf() {
      leaf.y += leaf.speed;
      leaf.x += Math.sin(leaf.y * 0.01);
      if (leaf.y > window.innerHeight + 20) {
        leaf.y = -20;
        leaf.x = Math.random() * window.innerWidth;
      }
      leaf.style.transform = `translate(${leaf.x}px, ${leaf.y}px)`;
      requestAnimationFrame(animateLeaf);
    }

    animateLeaf();
  }
}
</script>

</body>
</html>
