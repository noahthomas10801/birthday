<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Letter 💌</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background:#000;
  overflow:hidden;
  text-align:center;
  touch-action: pan-y;
}

/* OPEN SCREEN */
#openScreen {
  height:100vh;
  background:linear-gradient(135deg,#0f3d1e,#1f6f3a);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  cursor:pointer;
}

.envelope { font-size:60px; margin-bottom:20px; }

#content {
  display:none;
  position:relative;
  height:100vh;
  width:100vw;
}

/* PANELS */
.panel {
  position:absolute;
  width:100%;
  height:100%;
  padding:20px;
  opacity:0;
  transition:opacity 0.6s ease;
  overflow-y:auto;
}

.panel.active {
  opacity:1;
  z-index:2;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.grid img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* CAPTION */
.caption {
  margin-top:20px;
  font-size:18px;
  color:white;
}

/* LETTER */
.letter {
  margin-top:25px;
  padding:20px;
  background:linear-gradient(135deg,#2e8b57,#3cb371);
  color:white;
  border-radius:18px;
  font-size:17px;
  line-height:1.6;
}

/* ANIMATION LAYERS */
.animLayer {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:5;
}

.fall {
  position:absolute;
  top:-60px;
  animation:fall linear infinite;
}

@keyframes fall {
  to { transform:translateY(110vh) rotate(360deg); }
}

.balloon {
  position:absolute;
  bottom:-80px;
  animation:floatUp linear infinite;
}

@keyframes floatUp {
  to { transform:translateY(-120vh); }
}
</style>
</head>
<body>

<div id="openScreen">
  <div class="envelope">✉️</div>
  <h1>Click to Open</h1>
</div>

<div id="content">

<!-- Animation Layers -->
<div id="frogsLayer" class="animLayer"></div>
<div id="strawLayer" class="animLayer"></div>
<div id="balloonLayer" class="animLayer"></div>

<!-- PANEL 1 -->
<div class="panel active">
  <div class="grid">
    <img src="photo8.jpeg">
    <img src="photo9.jpeg">
    <img src="photo10.jpeg">
    <img src="photo11.jpeg">
  </div>
  <div class="caption">Our beautiful memories ❤️</div>
</div>

<!-- PANEL 2 -->
<div class="panel">
  <div class="grid">
    <img src="photo12.jpeg">
    <img src="photo13.jpeg">
    <img src="photo14.jpeg">
    <img src="photo15.jpeg">
  </div>
  <div class="caption">More adventures together ✨</div>
</div>

<!-- FINAL PANEL -->
<div class="panel">
  <div class="grid">
    <img src="photo2.jpeg">
    <img src="photo3.jpeg">
    <img src="photo4.jpeg">
    <img src="photo5.jpeg">
  </div>
  <div class="letter">
    My love,<br><br>
    Happy Birthday ❤️<br><br>
    Every photo here is a reminder of how lucky I am.
    You make my world brighter every single day.
    I love you more than words can ever explain.
  </div>
</div>

</div>

<script>
let current = 0;
const panels = document.querySelectorAll(".panel");
const openScreen = document.getElementById("openScreen");
const content = document.getElementById("content");

const frogsLayer = document.getElementById("frogsLayer");
const strawLayer = document.getElementById("strawLayer");
const balloonLayer = document.getElementById("balloonLayer");

openScreen.addEventListener("click", () => {
  openScreen.style.display="none";
  content.style.display="block";
  activatePanel(0);
});

/* SWIPE NAVIGATION */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) nextPanel();
  if(endX - startX > 50) prevPanel();
});

function nextPanel(){
  if(current < panels.length-1){
    activatePanel(current+1);
  }
}

function prevPanel(){
  if(current > 0){
    activatePanel(current-1);
  }
}

function activatePanel(index){
  panels[current].classList.remove("active");
  current = index;
  panels[current].classList.add("active");
  toggleAnimations();
}

/* CSS-ONLY ANIMATION GENERATOR (one-time creation) */
function generateFalling(layer, emoji, count, type="fall"){
  for(let i=0;i<count;i++){
    const el=document.createElement("div");
    el.textContent=emoji;
    el.className=type;
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(20+Math.random()*20)+"px";
    el.style.animationDuration=(4+Math.random()*4)+"s";
    el.style.animationDelay=(Math.random()*5)+"s";
    layer.appendChild(el);
  }
}

/* Generate once */
generateFalling(frogsLayer,"🐸",20,"fall");
generateFalling(strawLayer,"🍓",20,"fall");
generateFalling(balloonLayer,"🎈",15,"balloon");

/* Control visibility */
function toggleAnimations(){
  frogsLayer.style.display = current===0 ? "block":"none";
  strawLayer.style.display = current===1 ? "block":"none";
  balloonLayer.style.display = current===2 ? "block":"none";
}

/* Hide initially */
frogsLayer.style.display="none";
strawLayer.style.display="none";
balloonLayer.style.display="none";
</script>

</body>
</html>
