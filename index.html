<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Letter 💌</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Poppins',sans-serif;
  background:#000;
  overflow:hidden;
  text-align:center;
  touch-action: pan-y;
}

/* OPEN SCREEN */
#openScreen {
  height:100vh;
  background:linear-gradient(135deg,#0f3d1e,#1f6f3a);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  cursor:pointer;
}
.envelope { font-size:60px; margin-bottom:20px; }

/* CONTENT */
#content { display:none; position:relative; height:100vh; width:100vw; }

/* PANELS */
.panel {
  position:absolute;
  width:100%;
  height:100%;
  padding:20px;
  opacity:0;
  transition:opacity 0.6s ease, transform 0.6s ease;
  overflow-y:auto;
}
.panel.active { opacity:1; z-index:2; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
.grid img { width:100%; height:180px; object-fit:cover; border-radius:18px; box-shadow:0 8px 20px rgba(0,0,0,0.4); }

/* CAPTION */
.caption { margin-top:20px; font-size:18px; color:white; }

/* LETTER */
.letter {
  margin-top:25px;
  padding:20px;
  background:linear-gradient(135deg,#2e8b57,#3cb371);
  color:white;
  border-radius:18px;
  font-size:17px;
  line-height:1.6;
  opacity:0;
  transition: opacity 1.5s ease;
}

/* SWIPE INDICATORS */
#indicators {
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  z-index:10;
}
.dot {
  width:10px; height:10px;
  border-radius:50%;
  background:white;
  opacity:0.3;
  transition:opacity 0.3s;
}
.dot.active { opacity:1; }

/* FALLING ITEMS */
.animLayer {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:5;
}

/* falling item base */
.fallItem {
  position:absolute;
  top:-60px;
  width:40px;
  height:40px;
  transform:translate3d(0,0,0);
  animation-name:fall,sway;
  animation-timing-function:linear,ease-in-out;
  animation-iteration-count:infinite,infinite;
}

/* sway animation */
@keyframes sway {
  0% { transform: translateX(0); }
  50% { transform: translateX(15px); }
  100% { transform: translateX(0); }
}

/* vertical fall animation */
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(360deg); }
}

/* balloon */
.balloon {
  position:absolute;
  bottom:-80px;
  width:50px;
  height:50px;
  transform:translate3d(0,0,0);
  animation:floatUp linear infinite;
}
@keyframes floatUp { to { transform:translateY(-120vh); } }
</style>
</head>
<body>

<div id="openScreen">
  <div class="envelope">✉️</div>
  <h1>Click to Open</h1>
</div>

<div id="content">

  <!-- Animation Layers -->
  <div id="frogsLayer" class="animLayer"></div>
  <div id="strawLayer" class="animLayer"></div>
  <div id="balloonLayer" class="animLayer"></div>

  <!-- PANEL 1 -->
  <div class="panel active">
    <div class="grid">
      <img src="photo8.jpeg">
      <img src="photo9.jpeg">
      <img src="photo10.jpeg">
      <img src="photo11.jpeg">
    </div>
    <div class="caption">Our beautiful memories ❤️</div>
  </div>

  <!-- PANEL 2 -->
  <div class="panel">
    <div class="grid">
      <img src="photo12.jpeg">
      <img src="photo13.jpeg">
      <img src="photo14.jpeg">
      <img src="photo15.jpeg">
    </div>
    <div class="caption">More adventures together ✨</div>
  </div>

  <!-- FINAL PANEL -->
  <div class="panel">
    <div class="grid">
      <img src="photo2.jpeg">
      <img src="photo3.jpeg">
      <img src="photo4.jpeg">
      <img src="photo5.jpeg">
    </div>
    <div class="letter" id="finalLetter">
      My love,<br><br>
      Happy Birthday ❤️<br><br>
      Every photo here is a reminder of how lucky I am.
      You make my world brighter every single day.
      I love you more than words can ever explain.
    </div>
  </div>

  <!-- Indicators -->
  <div id="indicators">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
let current=0;
const panels=document.querySelectorAll(".panel");
const openScreen=document.getElementById("openScreen");
const content=document.getElementById("content");
const dots=document.querySelectorAll(".dot");
const frogsLayer=document.getElementById("frogsLayer");
const strawLayer=document.getElementById("strawLayer");
const balloonLayer=document.getElementById("balloonLayer");
const finalLetter=document.getElementById("finalLetter");

openScreen.addEventListener("click", ()=>{
  openScreen.style.display="none";
  content.style.display="block";
  toggleAnimations();
});

/* swipe navigation */
let startX=0;
document.addEventListener("touchstart", e=>{ startX=e.touches[0].clientX; });
document.addEventListener("touchend", e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) nextPanel();
  if(endX-startX>50) prevPanel();
});

function nextPanel(){ if(current<panels.length-1) activatePanel(current+1);}
function prevPanel(){ if(current>0) activatePanel(current-1);}

function activatePanel(index){
  panels[current].classList.remove("active");
  current=index;
  panels[current].classList.add("active");
  dots.forEach(d=>d.classList.remove("active"));
  dots[current].classList.add("active");

  if(current===2) finalLetter.style.opacity="1";
  else finalLetter.style.opacity="0";

  toggleAnimations();
}

/* Create falling images */
function generateFallingImage(layer,src,count){
  for(let i=0;i<count;i++){
    const img=document.createElement("img");
    img.src=src;
    img.className="fallItem";
    img.style.left=Math.random()*100+"vw";
    img.style.width=30+Math.random()*20+"px";
    img.style.height=30+Math.random()*20+"px";
    img.style.animationDuration=(4+Math.random()*4)+"s, "+(2+Math.random()*2)+"s";
    img.style.animationDelay=Math.random()*5+"s";
    layer.appendChild(img);
  }
}

/* Balloons */
function generateBalloons(layer,count){
  const pastel=["#FFD1DC","#C1E1C1","#B5D8FF","#FFF4B5","#E0BBE4","#FFDAC1"];
  for(let i=0;i<count;i++){
    const b=document.createElement("div");
    b.textContent="🎈";
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.fontSize=(28+Math.random()*18)+"px";
    b.style.color=pastel[Math.floor(Math.random()*pastel.length)];
    b.style.animationDuration=(8+Math.random()*5)+"s";
    layer.appendChild(b);
  }
}

/* Generate once with PNGs */
generateFallingImage(frogsLayer,"frog.png",25);        // use small frog PNG in repo
generateFallingImage(strawLayer,"strawberry.png",25);  // use small strawberry PNG in repo
generateBalloons(balloonLayer,15);

function toggleAnimations(){
  frogsLayer.style.display=current===0?"block":"none";
  strawLayer.style.display=current===1?"block":"none";
  balloonLayer.style.display=current===2?"block":"none";
}

/* hide initially */
frogsLayer.style.display="none";
strawLayer.style.display="none";
balloonLayer.style.display="none";
finalLetter.style.opacity="0";
</script>

</body>
</html>
