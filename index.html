<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* Opening Screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8e063, #56ab2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 100;
}

#startScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: white;
  margin-top: 20px;
}

.envelope {
  width: 90px;
  height: 60px;
  background: white;
  position: relative;
  border-radius: 6px;
}

.envelope:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-top: 30px solid #e0e0e0;
}

/* Main Content */
#mainContent {
  display: none;
}

/* Collage Section */
.collage {
  position: relative;
  width: 100%;
  min-height: 100vh;
  padding-bottom: 60px; /* space for letter */
  overflow: hidden; /* prevent elements outside from showing */
}

.collage img {
  position: absolute;
  border-radius: 16px;
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
  object-fit: cover;
  transition: transform 0.4s ease;
}

/* Center focal photo */
.collage img:nth-child(7) {
  top: 50%;
  left: 50%;
  width: 40%;
  height: auto;
  max-height: 70%;
  transform: translate(-50%, -50%);
  z-index: 8;
}

/* Spread photos 3,4,5,6 around center without overlap */
.collage img:nth-child(1) { top: 5%; left: 5%; width: 25%; transform: rotate(-6deg); }
.collage img:nth-child(2) { top: 10%; right: 5%; width: 25%; transform: rotate(6deg); }
.collage img:nth-child(3) { bottom: 40%; left: 10%; width: 20%; transform: rotate(-4deg); }
.collage img:nth-child(4) { bottom: 35%; right: 10%; width: 20%; transform: rotate(5deg); }
.collage img:nth-child(5) { top: 30%; left: 20%; width: 20%; transform: rotate(-5deg); }
.collage img:nth-child(6) { top: 25%; right: 20%; width: 20%; transform: rotate(4deg); }

/* Letter completely below collage */
.letter {
  position: relative;
  display: block;
  max-width: 900px;
  margin: 60px auto 80px auto;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.8;
  color: #1b4332;
  padding: 25px;
  background: linear-gradient(135deg, #c8f7c5, #56ab2f);
  border-radius: 16px;
  text-align: center;
  z-index: 1;
}

/* Sparkles */
.sparkle {
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, white 0%, #b7ffda 60%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  animation: sparkleAnim 1.5s ease-out forwards;
  z-index: 25;
}

@keyframes sparkleAnim {
  0% { opacity: 0; transform: scale(0.5); }
  30% { opacity: 1; }
  100% { opacity: 0; transform: scale(2); }
}

/* Frogs */
.frog {
  position: fixed;
  width: 30px;
  height: 30px;
  background-image: url('https://i.imgur.com/gXaNddC.png');
  background-size: contain;
  background-repeat: no-repeat;
  pointer-events: none;
  z-index: 30; /* above collage */
}

/* Leaves */
.leaf {
  position: fixed;
  width: 25px;
  height: 25px;
  background-image: url('https://i.imgur.com/46e8VzS.png');
  background-size: contain;
  background-repeat: no-repeat;
  opacity: .7;
  pointer-events: none;
  z-index: 28; /* above collage, below frogs */
}

/* Mobile adjustments */
@media (max-width: 600px) {
  .collage img:nth-child(7) { width: 60%; max-height: 50%; }
  .collage img:nth-child(1) { width: 40%; top: 5%; left: 5%; }
  .collage img:nth-child(2) { width: 40%; top: 10%; right: 5%; }
  .collage img:nth-child(3) { width: 35%; bottom: 45%; left: 5%; }
  .collage img:nth-child(4) { width: 35%; bottom: 40%; right: 5%; }
  .collage img:nth-child(5) { width: 30%; top: 30%; left: 10%; }
  .collage img:nth-child(6) { width: 30%; top: 25%; right: 15%; }
}
</style>
</head>

<body>
<div id="startScreen">
  <div class="envelope"></div>
  <h1>Click to Open</h1>
</div>

<div id="mainContent">
  <div class="collage fade-in" id="collage">
    <img src="photo1.jpeg">
    <img src="photo2.jpeg">
    <img src="photo3.jpeg">
    <img src="photo4.jpeg">
    <img src="photo5.jpeg">
    <img src="photo6.jpeg">
    <img src="photo7.jpeg">
  </div>

  <div class="letter fade-in" id="letter">
    My love,<br><br>
    Every moment with you feels like magic.
    You are my favorite memory, my favorite laugh,
    and my favorite place to be.
    I made this just for you. 💚
  </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");

startScreen.addEventListener("click", () => {
  startScreen.style.display = "none";
  mainContent.style.display = "block";

  setTimeout(() => {
    document.getElementById("collage").classList.add("show");
  }, 200);

  setTimeout(() => {
    document.getElementById("letter").classList.add("show");
  }, 1200);

  createFrogs();
  createLeaves();
});

/* Frogs falling from top over collage */
function createFrogs() {
  const frogCount = window.innerWidth < 600 ? 20 : 50;

  for (let i = 0; i < frogCount; i++) {
    spawnFrog(Math.random() * window.innerWidth, -50);
  }

  function spawnFrog(x, y) {
    const frog = document.createElement("div");
    frog.classList.add("frog");
    frog.x = x;
    frog.y = y;
    frog.vx = (Math.random() - 0.5) * 1.5;
    frog.vy = 1 + Math.random() * 2;
    frog.time = Math.random() * Math.PI * 2;
    frog.jumpHeight = 10 + Math.random() * 15;
    frog.jumpSpeed = 0.05 + Math.random() * 0.03;
    frog.size = 0.7 + Math.random() * 0.5;
    frog.rotation = Math.random() * 360;
    frog.spinSpeed = (Math.random() - 0.5) * 5;

    document.body.appendChild(frog);

    function animate() {
      frog.time += frog.jumpSpeed;
      const jumpSin = Math.sin(frog.time);
      const jumpOffset = jumpSin * frog.jumpHeight;
      const scaleY = 1 + jumpSin * 0.3;
      const scaleX = 1 - jumpSin * 0.2;
      frog.rotation += frog.spinSpeed;

      frog.x += frog.vx;
      frog.y += frog.vy;

      frog.style.transform =
        `translate(${frog.x}px, ${frog.y - jumpOffset}px)
         rotate(${frog.rotation}deg)
         scale(${scaleX * frog.size}, ${scaleY * frog.size})`;

      if (frog.y - jumpOffset < window.innerHeight) requestAnimationFrame(animate);
    }

    animate();
  }
}

/* Leaves falling from top over collage */
function createLeaves() {
  const leafCount = window.innerWidth < 600 ? 10 : 15;

  for (let i = 0; i < leafCount; i++) {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.x = Math.random() * window.innerWidth;
    leaf.y = -20;
    leaf.speed = 0.3 + Math.random();
    document.body.appendChild(leaf);

    function animateLeaf() {
      leaf.y += leaf.speed;
      leaf.x += Math.sin(leaf.y * .01);
      if (leaf.y > window.innerHeight * 0.95) {
        leaf.y = -20;
        leaf.x = Math.random() * window.innerWidth;
      }
      leaf.style.transform = `translate(${leaf.x}px, ${leaf.y}px)`;
      requestAnimationFrame(animateLeaf);
    }

    animateLeaf();
  }
}
</script>
</body>
</html>
