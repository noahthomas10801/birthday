<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  background: white;
}

/* Opening screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8e063, #56ab2f);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 100;
}

#startScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: white;
}

.envelope {
  width: 90px;
  height: 60px;
  background: white;
  border-radius: 8px;
  position: relative;
}

.envelope:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-top: 30px solid #e0e0e0;
}

/* Main content */
#mainContent {
  display: none;
}

/* Full viewport pyramid grid */
.collage {
  display: grid;
  width: 100vw;
  height: 100vh;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 10% 20% 30% 20% 10%;
  gap: 0px;
}

.collage img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 0px;
}

/* Photo positions */
.photo1 { grid-column: 1 / span 2; grid-row: 1; }
.photo2 { grid-column: 1;        grid-row: 2; }
.photo3 { grid-column: 2;        grid-row: 2; }
.photo7 { grid-column: 1 / span 2; grid-row: 3; } /* center large */
.photo4 { grid-column: 1;        grid-row: 4; }
.photo5 { grid-column: 2;        grid-row: 4; }
.photo6 { grid-column: 1 / span 2; grid-row: 5; }

/* Letter */
.letter {
  max-width: 900px;
  margin: 20px auto 80px auto;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.7;
  color: #1b4332;
  padding: 22px;
  background: linear-gradient(135deg, #c8f7c5, #56ab2f);
  border-radius: 14px;
  text-align: center;
}

/* Frogs falling from top of *screen* */
.frog {
  position: fixed;
  width: 32px;
  height: 32px;
  background: url('https://i.imgur.com/gXaNddC.png') center/contain no-repeat;
  pointer-events: none;
  z-index: 50;
}

/* Leaves falling from top of *screen* */
.leaf {
  position: fixed;
  width: 24px;
  height: 24px;
  background: url('https://i.imgur.com/46e8VzS.png') center/contain no-repeat;
  pointer-events: none;
  opacity: 0.8;
  z-index: 45;
}

/* Mobile stacking */
@media (max-width: 600px) {
  .collage {
    grid-template-columns: 1fr;
    grid-template-rows: repeat(7, 1fr);
  }
  .photo1, .photo7, .photo6 {
    grid-column: 1;
  }
  .photo2, .photo3, .photo4, .photo5 {
    grid-column: 1;
  }
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="envelope"></div>
  <h1>Click to Open</h1>
</div>

<div id="mainContent">
  <div class="collage">
    <img src="photo1.jpeg" class="photo1">
    <img src="photo2.jpeg" class="photo2">
    <img src="photo3.jpeg" class="photo3">
    <img src="photo4.jpeg" class="photo4">
    <img src="photo5.jpeg" class="photo5">
    <img src="photo6.jpeg" class="photo6">
    <img src="photo7.jpeg" class="photo7">
  </div>

  <div class="letter">
    My love,<br><br>
    Every moment with you feels like magic.
    You are my favorite memory, my favorite laugh,
    and my favorite place to be.
    I made this just for you. 💚
  </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");

startScreen.addEventListener("click", () => {
  startScreen.style.display = "none";
  mainContent.style.display = "block";

  createFrogs();
  createLeaves();
});

/* Frogs falling from *top of screen* */
function createFrogs() {
  const count = window.innerWidth < 600 ? 25 : 60;
  for (let i = 0; i < count; i++) {
    spawnFrog(Math.random() * window.innerWidth, -80);
  }

  function spawnFrog(x, y) {
    const frog = document.createElement("div");
    frog.classList.add("frog");
    frog.x = x;
    frog.y = y;
    frog.vx = (Math.random() - 0.5) * 1.5;
    frog.vy = 1 + Math.random() * 1.8;
    document.body.appendChild(frog);

    function animate() {
      frog.y += frog.vy;
      frog.x += frog.vx;
      frog.style.transform = `translate(${frog.x}px, ${frog.y}px)`;
      if (frog.y < window.innerHeight + 50) requestAnimationFrame(animate);
    }
    animate();
  }
}

/* Leaves falling from *top of screen* */
function createLeaves() {
  const count = window.innerWidth < 600 ? 12 : 18;
  for (let i = 0; i < count; i++) {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.x = Math.random() * window.innerWidth;
    leaf.y = -60;
    leaf.speed = 0.3 + Math.random() * 0.8;
    document.body.appendChild(leaf);

    function animateLeaf() {
      leaf.y += leaf.speed;
      leaf.x += Math.sin(leaf.y * 0.01) * 1.2;
      leaf.style.transform = `translate(${leaf.x}px, ${leaf.y}px)`;
      if (leaf.y < window.innerHeight + 60) requestAnimationFrame(animateLeaf);
    }
    animateLeaf();
  }
}
</script>

</body>
</html>
