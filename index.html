<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  background: white;
}

/* Opening Screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8e063, #56ab2f);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: pointer;
  transition: opacity .4s ease;
}

#startScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  color: white;
  margin-top: 20px;
}

.envelope {
  width: 80px;
  height: 55px;
  background: white;
  border-radius: 6px;
  position: relative;
}

.envelope:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  border-top: 28px solid #e0e0e0;
}

/* Main content */
#mainContent {
  display: none;
}

/* Collage */
.collage {
  display: grid;
  width: 100vw;
  min-height: 100vh;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 12vh 20vh 30vh 20vh 12vh;
  gap: 6px;
  padding: 6px;
  box-sizing: border-box;
}

.collage img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

/* Pyramid Layout */
.photo1 { grid-column: 1 / span 2; grid-row: 1; }
.photo2 { grid-column: 1; grid-row: 2; }
.photo3 { grid-column: 2; grid-row: 2; }
.photo7 { grid-column: 1 / span 2; grid-row: 3; }
.photo4 { grid-column: 1; grid-row: 4; }
.photo5 { grid-column: 2; grid-row: 4; }
.photo6 { grid-column: 1 / span 2; grid-row: 5; }

/* Letter */
.letter {
  width: 90%;
  max-width: 800px;
  margin: 40px auto 80px auto;
  padding: 24px;
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  line-height: 1.8;
  font-weight: 600;
  text-align: center;
  color: #1b4332;
  background: linear-gradient(135deg, #c8f7c5, #56ab2f);
  border-radius: 18px;
}

/* Falling frogs */
.frog {
  position: fixed;
  width: 32px;
  height: 32px;
  background: url('https://i.imgur.com/gXaNddC.png') center/contain no-repeat;
  pointer-events: none;
  z-index: 200;
}

/* Falling leaves */
.leaf {
  position: fixed;
  width: 24px;
  height: 24px;
  background: url('https://i.imgur.com/46e8VzS.png') center/contain no-repeat;
  pointer-events: none;
  opacity: .85;
  z-index: 190;
}

/* Mobile improvements */
@media (max-width: 600px) {

  #startScreen h1 {
    font-size: 2rem;
  }

  .collage {
    grid-template-columns: 1fr;
    grid-template-rows: repeat(7, 40vh);
    gap: 8px;
    padding: 8px;
  }

  .photo1,
  .photo2,
  .photo3,
  .photo4,
  .photo5,
  .photo6,
  .photo7 {
    grid-column: 1;
  }

  .letter {
    font-size: 1.15rem;
  }
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="envelope"></div>
  <h1>Click to Open</h1>
</div>

<div id="mainContent">
  <div class="collage">
    <img src="photo1.jpeg" class="photo1">
    <img src="photo2.jpeg" class="photo2">
    <img src="photo3.jpeg" class="photo3">
    <img src="photo7.jpeg" class="photo7">
    <img src="photo4.jpeg" class="photo4">
    <img src="photo5.jpeg" class="photo5">
    <img src="photo6.jpeg" class="photo6">
  </div>

  <div class="letter">
    My love,<br><br>
    Every moment with you feels like magic.
    You are my favorite memory, my favorite laugh,
    and my favorite place to be.
    I made this just for you. 💚
  </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");

/* Faster open for iPhone */
function openSite() {
  startScreen.style.opacity = "0";
  setTimeout(() => {
    startScreen.style.display = "none";
    mainContent.style.display = "block";
    startAnimations();
  }, 300);
}

startScreen.addEventListener("click", openSite);
startScreen.addEventListener("touchstart", openSite);

/* Continuous falling animation */
function startAnimations() {
  setInterval(() => spawnFrog(), 300);
  setInterval(() => spawnLeaf(), 600);
}

function spawnFrog() {
  const frog = document.createElement("div");
  frog.className = "frog";
  frog.style.left = Math.random() * window.innerWidth + "px";
  frog.style.top = "-40px";
  document.body.appendChild(frog);

  let y = -40;
  let xDrift = (Math.random() - 0.5) * 2;

  function fall() {
    y += 2 + Math.random();
    frog.style.top = y + "px";
    frog.style.left = parseFloat(frog.style.left) + xDrift + "px";
    if (y < window.innerHeight + 40) {
      requestAnimationFrame(fall);
    } else {
      frog.remove();
    }
  }
  fall();
}

function spawnLeaf() {
  const leaf = document.createElement("div");
  leaf.className = "leaf";
  leaf.style.left = Math.random() * window.innerWidth + "px";
  leaf.style.top = "-40px";
  document.body.appendChild(leaf);

  let y = -40;

  function fall() {
    y += 1.2;
    leaf.style.top = y + "px";
    leaf.style.left =
      parseFloat(leaf.style.left) + Math.sin(y * 0.02) * 2 + "px";
    if (y < window.innerHeight + 40) {
      requestAnimationFrame(fall);
    } else {
      leaf.remove();
    }
  }
  fall();
}
</script>

</body>
</html>
