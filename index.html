<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  overflow-x: hidden;
}

/* Opening Screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8e063, #56ab2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 100;
}

#startScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: white;
  margin-top: 20px;
}

.envelope {
  width: 90px;
  height: 60px;
  background: white;
  position: relative;
  border-radius: 6px;
}

.envelope:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-top: 30px solid #e0e0e0;
}

/* Main Content */
#mainContent {
  display: none;
}

/* Collage Section */
.collage {
  position: relative;
  width: 100%;
  height: 100vh; /* Full screen */
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Rows for stacked layout */
.collage-row {
  display: flex;
  width: 100%;
  flex: 1;
}

.collage-row img {
  width: 100%;
  object-fit: cover;
  border-radius: 8px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* Adjust for rows with multiple photos */
.row-two img {
  width: 50%;
}

.row-center img {
  width: 100%;
}

/* Letter below collage */
.letter {
  position: relative;
  display: block;
  max-width: 900px;
  margin: 60px auto 80px auto;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.8;
  color: #1b4332;
  padding: 25px;
  background: linear-gradient(135deg, #c8f7c5, #56ab2f);
  border-radius: 16px;
  text-align: center;
  z-index: 1;
}

/* Frogs */
.frog {
  position: fixed;
  width: 30px;
  height: 30px;
  background-image: url('https://i.imgur.com/gXaNddC.png');
  background-size: contain;
  background-repeat: no-repeat;
  pointer-events: none;
  z-index: 30;
}

/* Leaves */
.leaf {
  position: fixed;
  width: 25px;
  height: 25px;
  background-image: url('https://i.imgur.com/46e8VzS.png');
  background-size: contain;
  background-repeat: no-repeat;
  opacity: .7;
  pointer-events: none;
  z-index: 28;
}

/* Mobile adjustments */
@media (max-width: 600px) {
  .row-two img { width: 50%; }
  .row-center img { width: 100%; }
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="envelope"></div>
  <h1>Click to Open</h1>
</div>

<div id="mainContent">
  <div class="collage" id="collage">
    <div class="collage-row row-one">
      <img src="photo1.jpeg">
    </div>
    <div class="collage-row row-two">
      <img src="photo2.jpeg">
      <img src="photo3.jpeg">
    </div>
    <div class="collage-row row-center">
      <img src="photo7.jpeg">
    </div>
    <div class="collage-row row-two">
      <img src="photo4.jpeg">
      <img src="photo5.jpeg">
    </div>
    <div class="collage-row row-one">
      <img src="photo6.jpeg">
    </div>
  </div>

  <div class="letter" id="letter">
    My love,<br><br>
    Every moment with you feels like magic.
    You are my favorite memory, my favorite laugh,
    and my favorite place to be.
    I made this just for you. 💚
  </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");
const collage = document.getElementById("collage");

startScreen.addEventListener("click", () => {
  startScreen.style.display = "none";
  mainContent.style.display = "block";

  createFrogs();
  createLeaves();
});

/* Frogs falling from top of page */
function createFrogs() {
  const frogCount = window.innerWidth < 600 ? 20 : 50;

  for (let i = 0; i < frogCount; i++) {
    spawnFrog(Math.random() * window.innerWidth, -50);
  }

  function spawnFrog(x, y) {
    const frog = document.createElement("div");
    frog.classList.add("frog");
    frog.x = x;
    frog.y = y;
    frog.vx = (Math.random() - 0.5) * 1.5;
    frog.vy = 1 + Math.random() * 2;
    frog.rotation = Math.random() * 360;
    frog.spinSpeed = (Math.random() - 0.5) * 5;
    document.body.appendChild(frog);

    function animate() {
      frog.x += frog.vx;
      frog.y += frog.vy;
      frog.rotation += frog.spinSpeed;

      frog.style.transform = `translate(${frog.x}px, ${frog.y}px) rotate(${frog.rotation}deg)`;

      if (frog.y < window.innerHeight) requestAnimationFrame(animate);
    }

    animate();
  }
}

/* Leaves falling from top of page */
function createLeaves() {
  const leafCount = window.innerWidth < 600 ? 10 : 15;

  for (let i = 0; i < leafCount; i++) {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.x = Math.random() * window.innerWidth;
    leaf.y = -20;
    leaf.speed = 0.3 + Math.random();
    document.body.appendChild(leaf);

    function animateLeaf() {
      leaf.y += leaf.speed;
      leaf.x += Math.sin(leaf.y * 0.01);
      if (leaf.y > window.innerHeight) {
        leaf.y = -20;
        leaf.x = Math.random() * window.innerWidth;
      }
      leaf.style.transform = `translate(${leaf.x}px, ${leaf.y}px)`;
      requestAnimationFrame(animateLeaf);
    }

    animateLeaf();
  }
}
</script>

</body>
</html>
