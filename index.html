<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Me 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #c8f7c5, #8ee4af, #56c596);
}

/* Opening Screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #a8e063, #56ab2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 100;
}

#startScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: white;
  margin-top: 20px;
}

.envelope {
  width: 90px;
  height: 60px;
  background: white;
  position: relative;
  border-radius: 6px;
}

.envelope:before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-top: 30px solid #e0e0e0;
}

/* Main Content */
#mainContent {
  display: none;
  padding: 30px 15px 80px 15px;
  text-align: center;
}

/* Fade-in animation */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}

/* Collage */
.collage {
  position: relative;
  max-width: 700px;
  height: 500px;
  margin: 40px auto;
}

.collage img {
  position: absolute;
  border-radius: 18px;
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
  transition: transform 0.4s ease;
}

.collage img:hover {
  transform: scale(1.05) rotate(0deg) !important;
  z-index: 20;
}

/* Desktop positions with photo7 as focal */
.collage img:nth-child(1) { top: 0; left: 5%; transform: rotate(-6deg); z-index: 1; }
.collage img:nth-child(2) { top: 40px; right: 5%; transform: rotate(8deg); z-index: 2; }
.collage img:nth-child(3) { top: 160px; left: 15%; transform: rotate(-4deg); z-index: 3; }
.collage img:nth-child(4) { top: 200px; right: 10%; transform: rotate(6deg); z-index: 4; }
.collage img:nth-child(5) { top: 300px; left: 30%; transform: rotate(-8deg); z-index: 5; }
.collage img:nth-child(6) { top: 100px; left: 35%; transform: rotate(5deg); z-index: 6; }
/* Center focal photo */
.collage img:nth-child(7) { top: 180px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 55%; z-index: 8; }

/* Letter */
.letter {
  max-width: 700px;
  margin: 40px auto 0 auto;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  line-height: 1.8;
  color: #1b4332;
  padding: 15px;
  background: rgba(255,255,255,0.7);
  border-radius: 12px;
}

/* Sparkles */
.sparkle {
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, white 0%, #b7ffda 60%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  animation: sparkleAnim 1.5s ease-out forwards;
  z-index: 10;
}

@keyframes sparkleAnim {
  0% { opacity: 0; transform: scale(0.5); }
  30% { opacity: 1; }
  100% { opacity: 0; transform: scale(2); }
}

/* Frogs */
.frog {
  position: fixed;
  width: 30px;
  height: 30px;
  background-image: url('https://i.imgur.com/gXaNddC.png');
  background-size: contain;
  background-repeat: no-repeat;
  pointer-events: none;
  z-index: 5;
}

/* Leaves */
.leaf {
  position: fixed;
  width: 25px;
  height: 25px;
  background-image: url('https://i.imgur.com/46e8VzS.png');
  background-size: contain;
  background-repeat: no-repeat;
  opacity: .7;
  pointer-events: none;
  z-index: 4;
}

/* Mobile adjustments */
@media (max-width: 600px) {
  #startScreen h1 { font-size: 2rem; }
  .letter { font-size: 1.2rem; line-height: 1.6; padding: 12px; }
  
  .collage {
    position: relative;
    height: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .collage img {
    position: relative;
    width: 100%;
    height: auto;
    transform: none !important;
  }
}
</style>
</head>

<body>

<div id="startScreen">
  <div class="envelope"></div>
  <h1>Click to Open</h1>
</div>

<div id="mainContent">
  <div class="collage fade-in" id="collage">
    <img src="photo1.jpeg">
    <img src="photo2.jpeg">
    <img src="photo3.jpeg">
    <img src="photo4.jpeg">
    <img src="photo5.jpeg">
    <img src="photo6.jpeg">
    <img src="photo7.jpeg">
  </div>

  <div class="letter fade-in" id="letter">
    My love,<br><br>
    Every moment with you feels like magic.
    You are my favorite memory, my favorite laugh,
    and my favorite place to be.
    I made this just for you. 💚
  </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");

startScreen.addEventListener("click", () => {
  startScreen.style.display = "none";
  mainContent.style.display = "block";

  setTimeout(() => {
    document.getElementById("collage").classList.add("show");
    createSparkles();
  }, 200);

  setTimeout(() => {
    document.getElementById("letter").classList.add("show");
  }, 1200);

  createFrogs();
  createLeaves();
});

/* Edge Sparkles */
function createSparkles() {
  const collage = document.getElementById("collage");
  const rect = collage.getBoundingClientRect();
  const sparkleCount = 50;

  for (let i = 0; i < sparkleCount; i++) {
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");

    let x, y;
    const edge = Math.floor(Math.random() * 4);

    if (edge === 0) { x = rect.left + Math.random() * rect.width; y = rect.top - 10; }
    if (edge === 1) { x = rect.left + Math.random() * rect.width; y = rect.bottom + 10; }
    if (edge === 2) { x = rect.left - 10; y = rect.top + Math.random() * rect.height; }
    if (edge === 3) { x = rect.right + 10; y = rect.top + Math.random() * rect.height; }

    sparkle.style.left = x + "px";
    sparkle.style.top = y + "px";

    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1500);
  }
}

/* Frogs */
function createFrogs() {
  const frogCount = window.innerWidth < 600 ? 30 : 70;

  for (let i = 0; i < frogCount; i++) {
    spawnFrog(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
  }

  setInterval(() => {
    spawnFrog(Math.random() * window.innerWidth, -40);
  }, 2000);

  function spawnFrog(x, y) {
    const frog = document.createElement("div");
    frog.classList.add("frog");
    frog.x = x;
    frog.y = y;
    frog.vx = (Math.random() - 0.5) * 3;
    frog.vy = 1 + Math.random() * 2;
    frog.time = Math.random() * Math.PI * 2;
    frog.jumpHeight = 20 + Math.random() * 30;
    frog.jumpSpeed = 0.05 + Math.random() * 0.03;
    frog.size = 0.7 + Math.random() * 0.6;
    frog.rotation = Math.random() * 360;
    frog.spinSpeed = (Math.random() - 0.5) * 5;

    document.body.appendChild(frog);

    function animate() {
      frog.time += frog.jumpSpeed;
      if (Math.random() < 0.005) frog.spinSpeed = (Math.random() - 0.5) * 20;

      frog.x += frog.vx;
      frog.y += frog.vy;

      if (frog.x > window.innerWidth + 50) frog.x = -50;
      if (frog.x < -50) frog.x = window.innerWidth + 50;
      if (frog.y > window.innerHeight + 50) frog.y = -50;

      const jumpSin = Math.sin(frog.time);
      const jumpOffset = jumpSin * frog.jumpHeight;

      const scaleY = 1 + jumpSin * 0.3;
      const scaleX = 1 - jumpSin * 0.2;

      frog.rotation += frog.spinSpeed;

      frog.style.transform =
        `translate(${frog.x}px, ${frog.y - jumpOffset}px)
         rotate(${frog.rotation}deg)
         scale(${scaleX * frog.size}, ${scaleY * frog.size})`;

      requestAnimationFrame(animate);
    }

    animate();
  }
}

/* Leaves */
function createLeaves() {
  for (let i = 0; i < 15; i++) {
    const leaf = document.createElement("div");
    leaf.classList.add("leaf");
    leaf.x = Math.random() * window.innerWidth;
    leaf.y = Math.random() * window.innerHeight;
    leaf.speed = 0.3 + Math.random();

    document.body.appendChild(leaf);

    function animateLeaf() {
      leaf.y += leaf.speed;
      leaf.x += Math.sin(leaf.y * .01);
      if (leaf.y > window.innerHeight) {
        leaf.y = -20;
        leaf.x = Math.random() * window.innerWidth;
      }
      leaf.style.transform = `translate(${leaf.x}px, ${leaf.y}px)`;
      requestAnimationFrame(animateLeaf);
    }

    animateLeaf();
  }
}
</script>

</body>
</html>
